services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./event-context.md:/app/event-context.md
      - ./drafts:/app/drafts
      - ./doc-content:/app/doc-content
      - ./output:/app/output
    env_file:
      - .env

  webapp:
    build:
      context: .
      dockerfile: webapp/Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://localhost:8000
    depends_on:
      - api
